<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body>
    <h4>Built With Material Design For Bootstrap 4</h4>
    <button class="btn1">FREE DOWNLOAD <i class="fa fa-download" aria-hidden="true"></i></button>
    <div class="formgroup">
        <form action="" class="form1">
            <div class="formbackground">
                <div class="form-content">
                    <div class="login"><i class="fa fa-lock" aria-hidden="true"></i> Login:</div> <br>
                    <i class="fa fa-envelope lock" aria-hidden="true"></i>
                    <input type="text" placeholder="Your email" class="input1"> <br><br>
                    <i class="fa fa-lock lock" aria-hidden="true"></i>
                    <input type="text" placeholder="Your password" class="input1"> <br><br>
                    <button class="btn2">NEXT</button>
                </div>
            </div>
            <div>
                <button class="signin1">SIGN UP</button>
            </div>
        </form>
        <form action="" class="form2">
            <div class="formbackground2">
                <div class="form-content2">
                    <div class="login2"><i class="fa fa-user" aria-hidden="true"></i> Login:</div> <br>
                    <i class="fa fa-envelope envelope" aria-hidden="true"></i>
                    <input type="text" placeholder="Your email" class="input2"> <br><br>
                    <i class="fa fa-lock envelope" aria-hidden="true"></i>
                    <input type="text" placeholder="Your password" class="input2"> <br><br>
                    <button class="btn3">NEXT</button>
                </div>
            </div>
            <div>
                <button class="signin2">SIGN UP</button>
            </div>
        </form>
    </div>
